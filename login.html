<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Masuk ke akun IndoGlobalPrint Anda." />
  <title>Masuk – IndoGlobalPrint</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

<!-- Minimal Header for auth pages -->
<header class="header">
  <div class="container">
    <div class="header-inner">
      <a class="logo" href="index.html">
        <img src="https://cdn.builder.io/api/v1/image/assets%2F9c50b3bcefd1446d9de9ea9a61046f45%2Fc99ee96232a84df9a39eb98db8905fdc?format=webp&width=200&height=200" alt="Logo" onerror="this.style.display='none'" />
        IndoGlobalPrint
      </a>
      <div class="header-actions">
        <a href="daftar.html" class="btn btn-outline btn-sm">Belum punya akun? Daftar</a>
      </div>
    </div>
  </div>
</header>

<div class="toast-wrap" id="toast-wrap"></div>

<main class="auth-main">
  <div class="auth-box">
    <div class="auth-card">
      <!-- Icon -->
      <div style="width:56px;height:56px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem">
        <svg viewBox="0 0 24 24" style="width:28px;height:28px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>

      <h1>Selamat Datang Kembali 👋</h1>
      <p class="auth-sub">Belum punya akun? <a href="daftar.html">Daftar gratis sekarang</a></p>

      <form id="login-form" onsubmit="handleLogin(event)" novalidate>
        <!-- Email -->
        <div class="form-group">
          <label for="email">Alamat Email</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="contoh@email.com"
            autocomplete="email"
            required
          />
          <div class="form-error" id="email-error">Masukkan alamat email yang valid.</div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Kata Sandi</label>
          <div class="input-wrap">
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              placeholder="Masukkan kata sandi"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-pw" onclick="togglePw('password','eye-login')" aria-label="Tampilkan sandi">
              <svg id="eye-login" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="form-error" id="pw-error">Kata sandi harus diisi.</div>
        </div>

        <!-- Forgot -->
        <div class="forgot-row">
          <a href="#" class="forgot-link" onclick="handleForgot(event)">Lupa kata sandi?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary btn-auth" id="login-btn">
          <span id="login-btn-text">Masuk ke Akun</span>
          <svg id="login-spinner" style="display:none;width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;animation:spin 1s linear infinite" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-opacity=".25"/><path d="M12 2a10 10 0 0110 10" stroke-opacity="1"/></svg>
        </button>
      </form>

      <div class="auth-divider">atau lanjutkan dengan</div>

      <!-- Social Buttons (cosmetic) -->
      <div style="display:flex;gap:.75rem">
        <button onclick="socialLogin('Google')" style="flex:1;padding:.75rem;border:1.5px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;gap:.5rem;font-size:.88rem;font-weight:600;transition:all .2s;cursor:pointer;background:#fff" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='var(--border)'">
          <svg viewBox="0 0 24 24" style="width:18px;height:18px" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
        <button onclick="socialLogin('Facebook')" style="flex:1;padding:.75rem;border:1.5px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;gap:.5rem;font-size:.88rem;font-weight:600;transition:all .2s;cursor:pointer;background:#fff" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='var(--border)'">
          <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Facebook
        </button>
      </div>
    </div>
  </div>
</main>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script src="app.js"></script>
<script>
  // Redirect if already logged in
  if (getUser()) window.location.href = 'index.html';

  function togglePw(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  function validateEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

  function showFieldError(id, msg) {
    const input = document.getElementById(id);
    const err = document.getElementById(id + '-error');
    if (input) input.classList.add('error');
    if (err) { err.textContent = msg; err.classList.add('show'); }
  }
  function clearFieldError(id) {
    const input = document.getElementById(id);
    const err = document.getElementById(id + '-error');
    if (input) input.classList.remove('error');
    if (err) err.classList.remove('show');
  }

  ['email','password'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', () => clearFieldError(id));
  });

  async function handleLogin(e) {
    e.preventDefault();
    let valid = true;
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!validateEmail(email)) { showFieldError('email', 'Masukkan alamat email yang valid.'); valid = false; }
    if (!password) { showFieldError('password', 'Kata sandi harus diisi.'); valid = false; }
    if (!valid) return;

    // Loading state
    const btn = document.getElementById('login-btn');
    const txt = document.getElementById('login-btn-text');
    const spin = document.getElementById('login-spinner');
    btn.disabled = true; txt.textContent = 'Memproses...'; spin.style.display = 'inline';

    // Simulate API call
    await new Promise(r => setTimeout(r, 1200));

    // Check registered users
    const users = JSON.parse(localStorage.getItem('igp_users') || '[]');
    const found = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === password);

    if (found) {
      setUser({ name: found.name, email: found.email });
      showToast('Berhasil Masuk! 🎉', `Selamat datang kembali, ${found.name}!`, 'success');
      setTimeout(() => window.location.href = 'index.html', 1000);
    } else {
      btn.disabled = false; txt.textContent = 'Masuk ke Akun'; spin.style.display = 'none';
      showFieldError('email', 'Email atau kata sandi salah.');
      showToast('Gagal Masuk', 'Email atau kata sandi tidak sesuai.', 'error');
    }
  }

  function handleForgot(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!validateEmail(email)) { showFieldError('email', 'Masukkan email terlebih dahulu untuk reset sandi.'); return; }
    showToast('Email Terkirim 📧', `Link reset kata sandi dikirim ke ${email}`, 'success');
  }

  function socialLogin(provider) {
    showToast('Segera Hadir!', `Login dengan ${provider} akan segera tersedia.`, 'success');
  }
</script>
</body>
</html>
